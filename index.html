<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="max-w-[66%] mx-auto">
      <h1 class="text-3xl text-[#002C5C] font-bold mt-15">Job Application Tracker</h1>
      <div class="grid grid-cols-3 gap-4 mt-5 mb-7">
        <div class="bg-white rounded-lg border border-[#F1F2F4] p-5 ">
          <p class="font-medium">Total</p>
          <p id="total" class="text-2xl font-bold text-[#002C5C] pt-2">8</p>
        </div>
        <div class="bg-white rounded-lg border border-[#F1F2F4] p-5 ">
          <p class="font-medium text-[#002C5C]">Interview</p>
          <p id="interview" class="text-2xl font-bold text-[#10B981] pt-2">0</p>
        </div>
        <div class="bg-white rounded-lg border border-[#F1F2F4] p-5 ">
          <p class="font-medium text-[#002C5C]">Rejected</p>
          <p id="rejected" class="text-2xl font-bold text-[#EF4444] pt-2">0</p>
        </div>
      </div>
      <hr class="border-[#E6E7E9]">
    </header>

    <script src="js/script.js"></script>
  </body>
</html>
